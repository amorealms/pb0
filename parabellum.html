<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Parabellum — מחסן חלפים</title>
<style>
:root {
  --bg:#f0f2f5; --white:#fff; --border:#dde1e9;
  --accent:#1d4ed8; --accent-light:#eff6ff;
  --text:#0f172a; --muted:#64748b;
  --green:#15803d; --green-bg:#f0fdf4; --green-border:#86efac;
  --red:#b91c1c; --red-bg:#fef2f2; --red-border:#fca5a5;
  --yellow:#b45309; --yellow-bg:#fffbeb; --yellow-border:#fcd34d;
  --orange:#c2410c; --orange-bg:#fff7ed; --orange-border:#fb923c;
  --purple:#6d28d9; --purple-bg:#f5f3ff; --purple-border:#c4b5fd;
  --r:10px; --sh:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;min-height:100vh;padding-bottom:32px}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:14px}
.login-logo{font-size:52px}
.login-title{font-size:24px;font-weight:800}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:4px}
.login-card{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:var(--sh)}
.login-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:.5px}
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.name-btn{padding:12px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;transition:all .12s;text-align:center}
.name-btn.sel{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.name-input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;margin-bottom:12px}
.login-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer}
.login-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}

/* TOPBAR */
.topbar{background:var(--accent);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.back-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:34px;height:34px;border-radius:8px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;flex:1}
.user-badge{background:rgba(255,255,255,.2);font-size:12px;font-weight:700;padding:3px 9px;border-radius:12px;white-space:nowrap}

/* SYNC */
.sync-bar{background:var(--white);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* BREADCRUMB */
.breadcrumb{background:var(--white);border-bottom:1px solid var(--border);padding:8px 16px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-height:36px}
.bc-link{color:var(--accent);cursor:pointer;font-weight:600}

/* PROGRESS */
.progress-wrap{background:var(--white);padding:10px 16px 12px;border-bottom:1px solid var(--border)}
.progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.pills{display:flex;gap:6px;padding:8px 16px;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.pill{display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:16px;font-size:12px;font-weight:700;white-space:nowrap;border:1.5px solid transparent}
.p-green{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.p-red{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.p-yellow{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow-border)}
.p-orange{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-border)}
.p-purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}

/* SCREENS */
.screen{display:none}.screen.active{display:block}

/* CARDS */
.section-label{padding:14px 16px 6px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.card-list{padding:0 14px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:var(--sh);gap:12px;transition:border-color .12s}
.card:active{background:var(--accent-light);border-color:var(--accent)}
.card-icon{font-size:22px;flex-shrink:0}
.card-info{flex:1}
.card-name{font-size:16px;font-weight:700;margin-bottom:2px}
.card-meta{font-size:12px;color:var(--muted)}
.card-prog{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.prog-text{font-size:12px;font-weight:700;color:var(--muted)}
.mini-bar{width:56px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.mini-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.chevron{color:var(--muted);font-size:16px;flex-shrink:0}

/* ITEM ROWS */
.items-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.item-row{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;box-shadow:var(--sh)}
.item-row.s-found{border-right:4px solid var(--green);background:var(--green-bg)}
.item-row.s-missing{border-right:4px solid var(--red);background:var(--red-bg)}
.item-row.s-partial{border-right:4px solid var(--yellow);background:var(--yellow-bg)}
.item-row.s-transfer{border-right:4px solid var(--orange);background:var(--orange-bg)}
.item-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
.item-name{font-size:14px;font-weight:700;line-height:1.3;flex:1}
.item-makat{font-size:11px;color:var(--muted);font-family:monospace;white-space:nowrap}
.item-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.t-v{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.t-q{background:#f0f9ff;color:#0369a1;border-color:#bae6fd}
.t-found{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.t-missing{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.t-partial{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow-border)}
.t-transfer{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-border)}
.t-user{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}

.add-wrap{padding:10px 14px 4px}
.add-btn{width:100%;padding:13px;background:var(--white);border:1.5px dashed var(--accent);border-radius:var(--r);color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;text-align:center}

/* OVERLAY / SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--white);border-radius:18px 18px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 0 32px;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:15px;font-weight:800;padding:0 18px 4px}
.sheet-sub{font-size:12px;color:var(--muted);padding:0 18px 14px;border-bottom:1px solid var(--border);margin-bottom:12px}

.action-list{padding:0 14px;display:flex;flex-direction:column;gap:8px}
.action-btn{width:100%;padding:14px 16px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--white);font-size:15px;font-weight:700;cursor:pointer;text-align:right;display:flex;align-items:center;gap:10px;transition:all .1s}
.action-btn:active{transform:scale(.98)}
.action-btn .ic{font-size:20px;flex-shrink:0}
.ab-found{color:var(--green);border-color:var(--green-border)}.ab-found.sel{background:var(--green-bg);border-color:var(--green)}
.ab-missing{color:var(--red);border-color:var(--red-border)}.ab-missing.sel{background:var(--red-bg);border-color:var(--red)}
.ab-partial{color:var(--yellow);border-color:var(--yellow-border)}.ab-partial.sel{background:var(--yellow-bg);border-color:var(--yellow)}
.ab-transfer{color:var(--orange);border-color:var(--orange-border)}.ab-transfer.sel{background:var(--orange-bg);border-color:var(--orange)}

.inline-field{margin:4px 14px 0;display:none;flex-direction:column;gap:8px}
.inline-field.show{display:flex}
.inline-input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px}
.inline-confirm{padding:11px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;color:#fff;background:var(--accent)}
.loc-select{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--orange-border);border-radius:var(--r);color:var(--text);font-size:14px}

/* SEARCH */
.search-wrap{padding:10px 14px 0}
.search-input{width:100%;padding:11px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;box-shadow:var(--sh)}

/* ADD FORM */
.form-body{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.field-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px}
.field-input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px}
.form-save{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.form-cancel{width:100%;padding:11px;background:var(--bg);color:var(--muted);border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer}

/* EXPORT */
.export-wrap{padding:12px 14px 0}
.export-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(29,78,216,.22)}
.export-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;box-shadow:none}

/* HOME SECTIONS */
.home-section{margin-bottom:8px}
.home-section-title{padding:16px 16px 8px;font-size:13px;font-weight:800;color:var(--text);letter-spacing:.3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-logo">📦</div>
  <div class="login-title">Parabellum</div>
  <div class="login-sub">מחסן חלפים — ספירת מלאי</div>
  <div class="login-card">
    <span class="login-label">מי אתה?</span>
    <div class="name-grid">
      <button class="name-btn" data-name="אלכסיי" onclick="selectName(this)">אלכסיי</button>
      <button class="name-btn" data-name="יהונתן" onclick="selectName(this)">יהונתן</button>
      <button class="name-btn" data-name="שילת" onclick="selectName(this)">שילת</button>
      <button class="name-btn" data-name="עידן" onclick="selectName(this)">עידן</button>
    </div>
    <span class="login-label">או הקלד שם:</span>
    <input type="text" class="name-input" id="nameInput" placeholder="שם..." oninput="onNameType()">
    <button class="login-btn" id="loginBtn" onclick="doLogin()" disabled>כניסה →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
  <div class="topbar">
    <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none">‹</button>
    <div class="topbar-title" id="topTitle">מחסן חלפים</div>
    <div class="user-badge" id="userBadge">—</div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">מחובר</span>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="progress-wrap">
    <div class="progress-row"><span id="progText">טוען...</span><span id="progPct">—</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="pills">
    <div class="pill p-green">✓ <span id="cFound">0</span></div>
    <div class="pill p-red">✗ <span id="cMissing">0</span></div>
    <div class="pill p-yellow">~ <span id="cPartial">0</span></div>
    <div class="pill p-orange">→ <span id="cTransfer">0</span></div>
    <div class="pill p-purple">+ <span id="cNew">0</span></div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="screenHome">
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 חיפוש מקט או תיאור..." oninput="onSearch()">
    </div>
    <div id="searchResults" style="display:none">
      <div class="section-label">תוצאות חיפוש</div>
      <div class="items-list" id="searchList"></div>
    </div>
    <div id="homeContent">
      <div class="home-section">
        <div class="home-section-title">🗃️ תאים</div>
        <div class="card-list" id="taaList"></div>
      </div>
      <div class="home-section">
        <div class="home-section-title">🗄️ ארונות מגירות</div>
        <div class="card-list" id="aronList"></div>
      </div>
    </div>
    <div class="export-wrap">
      <button class="export-btn" id="exportBtn" onclick="exportCSV()" disabled>ייצא דוח CSV מלא</button>
    </div>
  </div>

  <!-- UNIT (תא or ארון) -->
  <div class="screen" id="screenUnit">
    <div class="section-label" id="unitSubLabel"></div>
    <div class="card-list" id="unitSubList"></div>
  </div>

  <!-- SUB (קומה or מגירה) — direct items + boxes -->
  <div class="screen" id="screenSub">
    <div class="section-label" id="subDirectLabel"></div>
    <div class="items-list" id="subDirectList"></div>
    <div class="section-label" id="subBoxLabel" style="display:none"></div>
    <div class="card-list" id="subBoxList"></div>
    <div class="add-wrap"><button class="add-btn" onclick="openAddForm()">＋ הוסף פריט לא רשום</button></div>
  </div>

  <!-- BOX -->
  <div class="screen" id="screenBox">
    <div class="section-label" id="boxLabel"></div>
    <div class="items-list" id="boxList"></div>
    <div class="add-wrap"><button class="add-btn" onclick="openAddForm()">＋ הוסף פריט לא רשום</button></div>
  </div>
</div>

<!-- ACTION SHEET -->
<div class="overlay" id="actionOverlay" onclick="overlayClick(event,'actionOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetName">—</div>
    <div class="sheet-sub" id="sheetMeta">—</div>
    <div class="action-list">
      <button class="action-btn ab-found"    id="abFound"    onclick="doAction('found')">   <span class="ic">✓</span>נמצא במלואו</button>
      <button class="action-btn ab-missing"  id="abMissing"  onclick="doAction('missing')"> <span class="ic">✗</span>לא נמצא</button>
      <button class="action-btn ab-partial"  id="abPartial"  onclick="toggleField('partialField')"><span class="ic">~</span>כמות שונה</button>
      <div class="inline-field" id="partialField">
        <input type="number" class="inline-input" id="partialQty" placeholder="כמות שנמצאה" min="0">
        <button class="inline-confirm" onclick="doAction('partial')">אישור</button>
      </div>
      <button class="action-btn ab-transfer" id="abTransfer" onclick="toggleField('transferField')"><span class="ic">→</span>הועבר למיקום אחר</button>
      <div class="inline-field" id="transferField">
        <select class="loc-select" id="transferDest"></select>
        <button class="inline-confirm" style="background:var(--orange)" onclick="doAction('transfer')">אישור</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD SHEET -->
<div class="overlay" id="addOverlay" onclick="overlayClick(event,'addOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">הוסף פריט לא רשום</div>
    <div class="sheet-sub" id="addSubLabel">—</div>
    <div class="form-body">
      <div><div class="field-label">מקט</div><input type="text" class="field-input" id="fMakat" placeholder="מספר מקט (אופציונלי)"></div>
      <div><div class="field-label">תיאור *</div><input type="text" class="field-input" id="fTeur" placeholder="שם הפריט"></div>
      <div><div class="field-label">חח עבור</div><input type="text" class="field-input" id="fHch" placeholder="מרכבה 4 / האמר / ..."></div>
      <div><div class="field-label">סוג כלי</div><input type="text" class="field-input" id="fKli" placeholder="מרכבות / רכב / נשק"></div>
      <div><div class="field-label">כמות שנמצאה</div><input type="number" class="field-input" id="fQty" placeholder="0" min="0"></div>
      <button class="form-save" onclick="saveNewItem()">שמור פריט</button>
      <button class="form-cancel" onclick="closeOverlay('addOverlay')">ביטול</button>
    </div>
  </div>
</div>

// ── LOGIN ──
let selName = null;
function selectName(btn) {
  selName = btn.dataset.name;
  document.getElementById("nameInput").value = "";
  document.querySelectorAll(".name-btn").forEach(b => b.classList.remove("sel"));
  btn.classList.add("sel");
  document.getElementById("loginBtn").disabled = false;
}
function onNameType() {
  selName = document.getElementById("nameInput").value.trim();
  document.querySelectorAll(".name-btn").forEach(b => b.classList.remove("sel"));
  document.getElementById("loginBtn").disabled = !selName;
}
function doLogin() {
  const name = document.getElementById("nameInput").value.trim() || selName;
  if(!name) return;
  currentUser = name;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  document.getElementById("userBadge").textContent = name;
  initSync();
  goHome();
}

// ── SYNC ──
async function loadState() {
  setSyncing(true);
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    if(r && r.value) {
      const d = JSON.parse(r.value);
      sharedState = d.state || {};
      addedItems  = d.added || [];
      syncTs = d.ts || 0;
    }
  } catch(e) {}
  setSyncing(false);
  reRender();
  updateGlobal();
}

async function saveState() {
  setSyncing(true);
  try {
    const ts = Date.now();
    await window.storage.set(STORAGE_KEY, JSON.stringify({state:sharedState, added:addedItems, ts}), true);
    syncTs = ts;
    document.getElementById("syncText").textContent = "מסונכרן · " + new Date().toLocaleTimeString("he-IL");
  } catch(e) {
    document.getElementById("syncDot").className = "sync-dot error";
    document.getElementById("syncText").textContent = "שגיאת סנכרון";
  }
  setSyncing(false);
}

async function pollState() {
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    if(r && r.value) {
      const d = JSON.parse(r.value);
      if(d.ts > syncTs) {
        sharedState = d.state || {};
        addedItems  = d.added || [];
        syncTs = d.ts;
        reRender();
        updateGlobal();
        document.getElementById("syncText").textContent = "עודכן · " + new Date().toLocaleTimeString("he-IL");
      }
    }
  } catch(e) {}
}

function setSyncing(on) {
  document.getElementById("syncDot").className = "sync-dot" + (on?" syncing":"");
  if(on) document.getElementById("syncText").textContent = "מסנכרן...";
}

function initSync() {
  loadState();
  setInterval(pollState, 5000);
}

// ── HELPERS ──
function allItems() { return [...ITEMS, ...addedItems]; }
function getStatus(id) { return sharedState[id]?.status || "pending"; }

function unitItems(type, unit) {
  return allItems().filter(i => i.type===type && i.unit===unit);
}
function subItems(type, unit, sub) {
  return allItems().filter(i => i.type===type && i.unit===unit && i.sub===sub);
}
function boxItems(type, unit, sub, box) {
  return allItems().filter(i => i.type===type && i.unit===unit && i.sub===sub && i.box===box);
}
function directItems(type, unit, sub) {
  return allItems().filter(i => i.type===type && i.unit===unit && i.sub===sub && !i.box);
}

function countDone(items) { return items.filter(i => getStatus(i.id) !== "pending").length; }

function miniBar(done, total) {
  const pct = total ? Math.round(done/total*100) : 0;
  return `<div class="card-prog"><div class="prog-text">${done}/${total}</div><div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div></div>`;
}

// ── GLOBAL PROGRESS ──
function updateGlobal() {
  const all = allItems();
  const total = all.length;
  const done = countDone(all);
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("progText").textContent = done + " / " + total + " טופלו";
  document.getElementById("progPct").textContent = pct + "%";
  document.getElementById("progFill").style.width = pct + "%";
  let f=0,m=0,p=0,t=0;
  all.forEach(i => {
    const s = getStatus(i.id);
    if(s==="found") f++; else if(s==="missing") m++;
    else if(s==="partial") p++; else if(s==="transfer") t++;
  });
  document.getElementById("cFound").textContent = f;
  document.getElementById("cMissing").textContent = m;
  document.getElementById("cPartial").textContent = p;
  document.getElementById("cTransfer").textContent = t;
  document.getElementById("cNew").textContent = addedItems.length;
  document.getElementById("exportBtn").disabled = done===0 && addedItems.length===0;
}

// ── NAVIGATION ──
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function setBreadcrumb(parts) {
  document.getElementById("breadcrumb").innerHTML = parts.join('<span style="margin:0 3px">›</span>');
}

function goHome() {
  nav = {unit:null, sub:null, box:null};
  document.getElementById("backBtn").style.display = "none";
  document.getElementById("topTitle").textContent = "מחסן חלפים";
  document.getElementById("searchInput").value = "";
  document.getElementById("searchResults").style.display = "none";
  document.getElementById("homeContent").style.display = "block";
  setBreadcrumb(['<span class="bc-link" onclick="goHome()">ראשי</span>']);
  renderHome();
  showScreen("screenHome");
}

function goUnit(type, unit) {
  nav = {unit:{type,unit}, sub:null, box:null};
  document.getElementById("backBtn").style.display = "flex";
  const label = type + " " + unit;
  document.getElementById("topTitle").textContent = label;
  setBreadcrumb([
    '<span class="bc-link" onclick="goHome()">ראשי</span>',
    '<span>'+label+'</span>'
  ]);
  renderUnit(type, unit);
  showScreen("screenUnit");
}

function goSub(type, unit, sub) {
  nav = {unit:{type,unit}, sub, box:null};
  document.getElementById("backBtn").style.display = "flex";
  const unitLabel = type + " " + unit;
  const subLabel = (type==="תא" ? "קומה " : "מגירה ") + sub;
  document.getElementById("topTitle").textContent = subLabel;
  setBreadcrumb([
    '<span class="bc-link" onclick="goHome()">ראשי</span>',
    '<span class="bc-link" onclick="goUnit(\''+ type +'\',\''+ unit +'\')">'+ unitLabel +'</span>',
    '<span>'+ subLabel +'</span>'
  ]);
  renderSub(type, unit, sub);
  showScreen("screenSub");
}

function goBox(type, unit, sub, box) {
  nav = {unit:{type,unit}, sub, box};
  document.getElementById("backBtn").style.display = "flex";
  const unitLabel = type + " " + unit;
  const subLabel = (type==="תא" ? "קומה " : "מגירה ") + sub;
  document.getElementById("topTitle").textContent = "קופסא " + box;
  setBreadcrumb([
    '<span class="bc-link" onclick="goHome()">ראשי</span>',
    '<span class="bc-link" onclick="goUnit(\''+ type +'\',\''+ unit +'\')">'+ unitLabel +'</span>',
    '<span class="bc-link" onclick="goSub(\''+ type +'\',\''+ unit +'\',\''+ sub +'\')">'+ subLabel +'</span>',
    '<span>קופסא '+ box +'</span>'
  ]);
  renderBox(type, unit, sub, box);
  showScreen("screenBox");
}

function goBack() {
  if(nav.box)        goSub(nav.unit.type, nav.unit.unit, nav.sub);
  else if(nav.sub)   goUnit(nav.unit.type, nav.unit.unit);
  else if(nav.unit)  goHome();
  else               goHome();
}

function renderHome() {
  const taaKeys  = Object.keys(STRUCTURE).filter(k => STRUCTURE[k].type==="תא").sort();
  const aronKeys = Object.keys(STRUCTURE).filter(k => STRUCTURE[k].type==="מגירה").sort();

  function renderUnitCard(key) {
    const u = STRUCTURE[key];
    const items = unitItems(u.type, u.unit);
    const done = countDone(items);
    const subCount = Object.keys(u.subs).length;
    const boxCount = Object.values(u.subs).reduce((a,b)=>a+b.length,0);
    return `<div class="card" onclick="goUnit('${u.type}','${u.unit}')">
      <div class="card-icon">${u.type==="תא"?"🗂️":"🗄️"}</div>
      <div class="card-info">
        <div class="card-name">${u.type} ${u.unit}</div>
        <div class="card-meta">${items.length} פריטים · ${subCount} ${u.type==="תא"?"קומות":"מגירות"}${boxCount?` · ${boxCount} קופסאות`:""}</div>
      </div>
      ${miniBar(done, items.length)}
      <div class="chevron">›</div>
    </div>`;
  }

  document.getElementById("taaList").innerHTML  = taaKeys.map(renderUnitCard).join("");
  document.getElementById("aronList").innerHTML = aronKeys.map(renderUnitCard).join("");
}

function renderUnit(type, unit) {
  const u = STRUCTURE[type+"_"+unit];
  const subs = Object.keys(u.subs).sort();
  const subLabel = type==="תא" ? "קומה" : "מגירה";
  document.getElementById("unitSubLabel").textContent = `בחר ${subLabel}`;
  document.getElementById("unitSubList").innerHTML = subs.map(sub => {
    const items = subItems(type, unit, sub);
    const done = countDone(items);
    const boxes = u.subs[sub];
    return `<div class="card" onclick="goSub('${type}','${unit}','${sub}')">
      <div class="card-icon">${type==="תא"?"📋":"📂"}</div>
      <div class="card-info">
        <div class="card-name">${subLabel} ${sub}</div>
        <div class="card-meta">${items.length} פריטים${boxes.length?" · "+boxes.length+" קופסאות":""}</div>
      </div>
      ${miniBar(done, items.length)}
      <div class="chevron">›</div>
    </div>`;
  }).join("");
}

function renderSub(type, unit, sub) {
  const direct = directItems(type, unit, sub);
  const u = STRUCTURE[type+"_"+unit];
  const boxes = u.subs[sub] || [];
  const subLabel = type==="תא" ? "קומה" : "מגירה";

  document.getElementById("subDirectLabel").textContent =
    `פריטים ישירים ב${subLabel} ${sub} (${direct.length})`;
  document.getElementById("subDirectList").innerHTML =
    direct.map(renderItemRow).join("") ||
    '<div style="padding:12px 0;color:var(--muted);font-size:13px;text-align:center">אין פריטים ישירים</div>';

  if(boxes.length) {
    document.getElementById("subBoxLabel").style.display = "block";
    document.getElementById("subBoxLabel").textContent = "קופסאות";
    document.getElementById("subBoxList").innerHTML = boxes.map(box => {
      const bi = boxItems(type, unit, sub, box);
      const done = countDone(bi);
      return `<div class="card" onclick="goBox('${type}','${unit}','${sub}','${box}')">
        <div class="card-icon">📦</div>
        <div class="card-info">
          <div class="card-name">קופסא ${box}</div>
          <div class="card-meta">${bi.length} פריטים</div>
        </div>
        ${miniBar(done, bi.length)}
        <div class="chevron">›</div>
      </div>`;
    }).join("");
  } else {
    document.getElementById("subBoxLabel").style.display = "none";
    document.getElementById("subBoxList").innerHTML = "";
  }
}

function renderBox(type, unit, sub, box) {
  const items = boxItems(type, unit, sub, box);
  document.getElementById("boxLabel").textContent = `פריטים בקופסא ${box} (${items.length})`;
  document.getElementById("boxList").innerHTML = items.map(renderItemRow).join("");
}

function renderItemRow(item) {
  const s = sharedState[item.id] || {};
  const status = s.status || "pending";
  let stag = "";
  if(status==="found")    stag = '<span class="tag t-found">✓ נמצא</span>';
  if(status==="missing")  stag = '<span class="tag t-missing">✗ חסר</span>';
  if(status==="partial")  stag = `<span class="tag t-partial">~ ${s.foundQty}</span>`;
  if(status==="transfer") stag = `<span class="tag t-transfer">→ ${s.dest||""}</span>`;
  const utag = s.user ? `<span class="tag t-user">${s.user}</span>` : "";
  return `<div class="item-row s-${status}" onclick="openAction('${item.id}')">
    <div class="item-top">
      <div class="item-makat" style="font-size:14px;font-weight:800;color:var(--text);font-family:monospace">${item.makat}</div>
    </div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px;line-height:1.3">${item.teur}</div>
    <div class="item-tags">
      ${item.hch?`<span class="tag t-v">${item.hch}</span>`:""}
      ${item.kli?`<span class="tag">${item.kli}</span>`:""}
      <span class="tag t-q">רשום: ${item.kama}</span>
      ${item.date?`<span class="tag">${item.date}</span>`:""}
      ${stag}${utag}
    </div>
  </div>`;
}

function reRender() {
  if(nav.box)      renderBox(nav.unit.type, nav.unit.unit, nav.sub, nav.box);
  else if(nav.sub) renderSub(nav.unit.type, nav.unit.unit, nav.sub);
  else if(nav.unit)renderUnit(nav.unit.type, nav.unit.unit);
  else             renderHome();
}

// ── SEARCH ──
function onSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if(!q) {
    document.getElementById("searchResults").style.display = "none";
    document.getElementById("homeContent").style.display = "block";
    return;
  }
  document.getElementById("homeContent").style.display = "none";
  document.getElementById("searchResults").style.display = "block";
  const ql = q.toLowerCase();
  const results = allItems().filter(i =>
    i.makat.toLowerCase().includes(ql) ||
    i.teur.toLowerCase().includes(ql) ||
    i.hch.toLowerCase().includes(ql)
  ).slice(0, 50);
  document.getElementById("searchList").innerHTML =
    results.length ? results.map(renderItemRow).join("") :
    '<div style="padding:24px;text-align:center;color:var(--muted)">לא נמצאו תוצאות</div>';
}

// ── ACTION SHEET ──
function openAction(id) {
  activeItemId = id;
  const item = allItems().find(i => i.id===id);
  const s = sharedState[id] || {};
  document.getElementById("sheetName").textContent = item.teur;
  document.getElementById("sheetMeta").textContent =
    item.makat + " · " + (item.hch||"—") + " · רשום: " + item.kama +
    (s.user ? " · עודכן ע\"י " + s.user : "");
  ["abFound","abMissing","abPartial","abTransfer"].forEach(b =>
    document.getElementById(b).classList.remove("sel"));
  const m = {found:"abFound",missing:"abMissing",partial:"abPartial",transfer:"abTransfer"};
  if(s.status && m[s.status]) document.getElementById(m[s.status]).classList.add("sel");
  document.getElementById("partialField").classList.remove("show");
  document.getElementById("transferField").classList.remove("show");
  document.getElementById("partialQty").value = s.foundQty || "";
  const sel = document.getElementById("transferDest");
  sel.innerHTML = ALL_LOCS.map(l =>
    `<option value="${l}"${s.dest===l?" selected":""}>${l}</option>`).join("");
  document.getElementById("actionOverlay").classList.add("open");
}

function toggleField(id) {
  const f = document.getElementById(id);
  f.classList.toggle("show");
  const other = id==="partialField" ? "transferField" : "partialField";
  document.getElementById(other).classList.remove("show");
}

async function doAction(type) {
  if(!activeItemId) return;
  const item = allItems().find(i => i.id===activeItemId);
  const base = {user:currentUser, ts:Date.now()};
  const current = sharedState[activeItemId]?.status;
  // Toggle off: clicking same status removes it
  if(type==="found" && current==="found")        { delete sharedState[activeItemId]; }
  else if(type==="missing" && current==="missing")    { delete sharedState[activeItemId]; }
  else if(type==="found")    sharedState[activeItemId] = {...base, status:"found",    foundQty:parseInt(item.kama)||0};
  else if(type==="missing")  sharedState[activeItemId] = {...base, status:"missing",  foundQty:0};
  else if(type==="partial") {
    const val = parseInt(document.getElementById("partialQty").value);
    if(isNaN(val)||val<0) { document.getElementById("partialQty").focus(); return; }
    if(current==="partial") { delete sharedState[activeItemId]; }
    else sharedState[activeItemId] = {...base, status:"partial", foundQty:val};
  } else if(type==="transfer") {
    const dest = document.getElementById("transferDest").value;
    if(current==="transfer") { delete sharedState[activeItemId]; }
    else sharedState[activeItemId] = {...base, status:"transfer", dest};
  }
  closeOverlay("actionOverlay");
  reRender();
  updateGlobal();
  await saveState();
}

// ── ADD FORM ──
function openAddForm() {
  let loc = "—";
  if(nav.box) loc = `${nav.unit.type} ${nav.unit.unit} - ${nav.sub} קופסא ${nav.box}`;
  else if(nav.sub) loc = `${nav.unit.type} ${nav.unit.unit} - ${nav.sub}`;
  document.getElementById("addSubLabel").textContent = "יתווסף ל: " + loc;
  document.getElementById("addOverlay").classList.add("open");
}

async function saveNewItem() {
  const teur = document.getElementById("fTeur").value.trim();
  if(!teur) { alert("חובה למלא תיאור"); return; }
  const id = "new_" + Date.now();
  const item = {
    id, isNew:true,
    makat: document.getElementById("fMakat").value.trim() || "—",
    teur,
    hch: document.getElementById("fHch").value.trim(),
    kli: document.getElementById("fKli").value.trim(),
    kama: parseInt(document.getElementById("fQty").value) || 0,
    date: new Date().toLocaleDateString("he-IL"),
    type: nav.unit?.type || "תא",
    unit: nav.unit?.unit || "01",
    sub:  nav.sub || "א",
    box:  nav.box || null,
    addedBy: currentUser
  };
  addedItems.push(item);
  sharedState[id] = {status:"found", foundQty:item.kama, user:currentUser, ts:Date.now()};
  closeOverlay("addOverlay");
  ["fMakat","fTeur","fHch","fKli","fQty"].forEach(i => document.getElementById(i).value="");
  reRender();
  updateGlobal();
  await saveState();
}

// ── OVERLAY UTILS ──
function overlayClick(e, id) {
  if(e.target===document.getElementById(id)) closeOverlay(id);
}
function closeOverlay(id) {
  document.getElementById(id).classList.remove("open");
}

// ── EXPORT ──
function exportCSV() {
  const sMap = {found:"נמצא",missing:"חסר",partial:"כמות שונה",transfer:"הועבר",pending:"לא נספר"};
  const rows = [["סוג","מקט","תיאור","חח עבור","סוג כלי","סוג אחסון","יחידה","תת-מיקום","קופסא","כמות רשומה","כמות שנמצאה","סטטוס","יעד העברה","עודכן ע\"י","תאריך עדכון","תאריך מקורי"]];
  allItems().forEach(item => {
    const s = sharedState[item.id] || {};
    const st = s.status || "pending";
    const fq = st==="found" ? item.kama : (st==="missing" ? 0 : (s.foundQty!==undefined ? s.foundQty : ""));
    const ts = s.ts ? new Date(s.ts).toLocaleString("he-IL") : "";
    rows.push([
      item.isNew?"חדש":"קיים", item.makat, item.teur, item.hch, item.kli,
      item.type, item.unit, item.sub, item.box||"",
      item.kama, fq, sMap[st]||st, s.dest||"", s.user||"", ts, item.date
    ]);
  });
  const bom = "\uFEFF";
  const csv = bom + rows.map(r => r.map(c => `"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "parabellum_ספירה_" + new Date().toLocaleDateString("he-IL").replace(/\//g,"-") + ".csv";
  a.click();
}
